<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows 10 Portal - New Zealand Edition</title>
<style>
    /* --- Windows 10 System Fonts & Reset --- */
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
        user-select: none;
    }

    /* --- Background: Wharariki Beach, NZ (The Cave View) --- */
    #desktop {
        height: 100vh;
        width: 100vw;
        background: url('https://images.unsplash.com') no-repeat center center fixed; 
        /* Note: This Unsplash image resembles the famous Wharariki Beach cave view. */
        background-size: cover;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
    }

    /* --- Taskbar --- */
    #taskbar {
        height: 40px;
        background-color: rgba(16, 16, 16, 0.95);
        display: flex;
        align-items: center;
        z-index: 1000;
        backdrop-filter: blur(10px);
    }

    #start-button {
        width: 48px;
        height: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: background 0.2s;
    }

    #start-button:hover, #start-button.active {
        background-color: rgba(255, 255, 255, 0.1);
    }

    #start-button svg {
        width: 18px;
        height: 18px;
        fill: white;
    }

    /* --- Start Menu --- */
    #start-menu {
        position: absolute;
        bottom: 40px;
        left: 0;
        width: 600px;
        height: 500px;
        background-color: rgba(31, 31, 31, 0.95);
        backdrop-filter: blur(20px);
        display: none; /* Hidden by default */
        flex-direction: row;
        color: white;
        box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        transition: transform 0.1s ease-in-out;
        transform-origin: bottom left;
    }

    #start-menu.open {
        display: flex;
        animation: slideUp 0.2s ease-out;
    }

    @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    /* --- Left Side: Options List --- */
    .menu-sidebar {
        width: 250px;
        background-color: rgba(0, 0, 0, 0.2);
        padding: 10px 0;
        display: flex;
        flex-direction: column;
    }

    .menu-option {
        padding: 15px 20px;
        cursor: pointer;
        font-size: 14px;
        display: flex;
        align-items: center;
        transition: background 0.2s;
    }

    .menu-option:hover {
        background-color: rgba(255, 255, 255, 0.1);
    }

    .menu-option span {
        margin-left: 10px;
    }

    /* Option Icons */
    .opt-icon { font-weight: bold; width: 20px; text-align: center; }

    /* --- Right Side: Tile Grid (The "Portal") --- */
    .tile-area {
        flex-grow: 1;
        padding: 20px;
        overflow-y: auto;
    }

    .tile-header {
        font-size: 12px;
        margin-bottom: 10px;
        margin-left: 5px;
        color: #ccc;
    }

    .tiles-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 8px;
    }

    /* --- Website Tiles --- */
    .tile {
        width: 100px;
        height: 100px;
        background-color: #0078D7; /* Windows Blue */
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 5px;
        cursor: pointer;
        position: relative;
        transition: transform 0.1s, outline 0.1s;
    }

    .tile:hover {
        outline: 2px solid rgba(255,255,255,0.5);
    }

    .tile:active {
        transform: scale(0.98);
    }

    .tile-icon {
        font-size: 24px;
        margin-bottom: 5px;
    }

    .tile-label {
        font-size: 12px;
        word-break: break-word;
    }

    /* Delete Mode Styling */
    .tile.delete-mode {
        background-color: #e81123; /* Windows Red */
        animation: shake 0.3s infinite;
    }

    .status-bar {
        padding: 10px 20px;
        font-size: 12px;
        color: #00ff00;
        background: black;
    }

    @keyframes shake {
        0% { transform: rotate(0deg); }
        25% { transform: rotate(1deg); }
        75% { transform: rotate(-1deg); }
        100% { transform: rotate(0deg); }
    }

</style>
</head>
<body>

<div id="desktop">
    <!-- Start Menu -->
    <div id="start-menu">
        <!-- Left Column: The Options -->
        <div class="menu-sidebar">
            <div style="padding: 10px 20px; font-weight: bold; margin-bottom: 10px;">Menu Options</div>
            
            <div class="menu-option" onclick="option1_addWebsite()">
                <div class="opt-icon">+</div>
                <span>1. Create Website</span>
            </div>

            <div class="menu-option" onclick="option2_deleteAll()">
                <div class="opt-icon">🗑️</div>
                <span>2. Delete All Websites</span>
            </div>

            <div class="menu-option" onclick="option3_toggleDeleteMode()" id="btn-del-mode">
                <div class="opt-icon">⚠️</div>
                <span id="del-mode-text">3. Delete Mode: OFF</span>
            </div>

            <div class="menu-option" onclick="option4_showWebsites()">
                <div class="opt-icon">▦</div>
                <span>4. Show Websites</span>
            </div>
            
            <div style="margin-top: auto; padding: 20px; font-size: 11px; color: #aaa;">
                Wharariki Beach Portal<br>Windows 10 Edition
            </div>
        </div>

        <!-- Right Column: The Portal Tiles -->
        <div class="tile-area" id="tile-area">
            <div class="tile-header">Pinned Tiles</div>
            <div class="tiles-container" id="grid">
                <!-- Tiles go here -->
            </div>
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div id="start-button" onclick="toggleStartMenu()">
            <!-- Windows 10 Logo SVG -->
            <svg xmlns="http://www.w3.org" viewBox="0 0 88 88">
                <path d="M0,12.402,35.687,7.29V42.913H0V12.402ZM0,47.468H35.687V83.1L0,77.979V47.468ZM40.131,6.659,88,0V42.913H40.131V6.659ZM40.131,47.468H88V88L40.131,81.328V47.468Z"/>
            </svg>
        </div>
    </div>
</div>

<script>
    // --- Data & State ---
    let websites = JSON.parse(localStorage.getItem('win10portal_sites')) || [];
    let deleteMode = false;
    const grid = document.getElementById('grid');
    const startMenu = document.getElementById('start-menu');
    const tileArea = document.getElementById('tile-area');

    // --- Initialization ---
    renderTiles();

    // --- Option 1: Create Website ---
    function option1_addWebsite() {
        const name = prompt("Enter Website Name (e.g., 'Google'):");
        if (!name) return;

        let url = prompt("Enter URL (e.g., 'google.com'):");
        if (!url) return;

        // Auto-add https:// logic
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'https://' + url;
        }

        websites.push({ name, url });
        saveAndRender();
        
        // If tiles area was hidden, show it now so user sees the result
        tileArea.style.display = 'block'; 
    }

    // --- Option 2: Delete All ---
    function option2_deleteAll() {
        if (confirm("Are you sure you want to DELETE ALL websites?")) {
            websites = [];
            saveAndRender();
        }
    }

    // --- Option 3: Delete Mode ---
    function option3_toggleDeleteMode() {
        deleteMode = !deleteMode;
        const btnText = document.getElementById('del-mode-text');
        
        if (deleteMode) {
            btnText.innerText = "3. Delete Mode: ON";
            btnText.style.color = "#ff5555";
        } else {
            btnText.innerText = "3. Delete Mode: OFF";
            btnText.style.color = "white";
        }
        renderTiles(); // Re-render to update styles
    }

    // --- Option 4: Show Websites ---
    function option4_showWebsites() {
        // This option ensures the right-side panel is visible and populated
        tileArea.style.display = 'block';
        alert("Websites loaded in the Start Menu tile area!");
    }

    // --- Core Functions ---

    function saveAndRender() {
        localStorage.setItem('win10portal_sites', JSON.stringify(websites));
        renderTiles();
    }

    function renderTiles() {
        grid.innerHTML = '';

        websites.forEach((site, index) => {
            const tile = document.createElement('div');
            tile.className = deleteMode ? 'tile delete-mode' : 'tile';
            
            // Icon
            const icon = document.createElement('div');
            icon.className = 'tile-icon';
            icon.innerText = deleteMode ? '❌' : '🌐';
            
            // Label
            const label = document.createElement('div');
            label.className = 'tile-label';
            label.innerText = site.name;

            tile.appendChild(icon);
            tile.appendChild(label);

            // Click Handler
            tile.onclick = () => {
                if (deleteMode) {
                    // Delete this specific site
                    websites.splice(index, 1);
                    saveAndRender();
                } else {
                    // Open Portal
                    window.open(site.url, '_blank');
                }
            };

            grid.appendChild(tile);
        });
    }

    function toggleStartMenu() {
        const btn = document.getElementById('start-button');
        
        if (startMenu.style.display === 'flex') {
            startMenu.classList.remove('open');
            setTimeout(() => startMenu.style.display = 'none', 100); // wait for anim
            btn.classList.remove('active');
        } else {
            startMenu.style.display = 'flex';
            // specific trigger for animation
            requestAnimationFrame(() => startMenu.classList.add('open'));
            btn.classList.add('active');
        }
    }

    // Close menu if clicking on desktop area
    document.getElementById('desktop').addEventListener('click', function(e) {
        if(e.target.id === 'desktop') {
            startMenu.classList.remove('open');
            setTimeout(() => startMenu.style.display = 'none', 100);
            document.getElementById('start-button').classList.remove('active');
        }
    });

</script>
</body>
</html>
